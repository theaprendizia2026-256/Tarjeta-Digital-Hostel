<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarjeta Digital</title>
    
    <meta name="theme-color" content="#2c1810">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
        <div class="header">
            <div class="logo">
                <img src="images/logo.png" alt="Logo ARTE">
            </div>
            <div class="subtitle">ATÍPICO</div>
            <div class="subtitle">Hostel</div>
        </div>

        <div class="content"> 
            
         <div class="info-item">
                <div class="icon"><i class="fab fa-instagram"></i></div>
                <div class="info-text">
                    <a href="https://www.instagram.com/atipicohostel?utm_source=qr"                                                        target="_blank">@atipicohostel</a>
                 </div>
             </div>

            <div class="info-item">
                <div class="icon"><i class="fab fa-whatsapp"></i></div>
                <div class="info-text">
                    <a href="https://wa.me/56982524533" target="_blank">WhatsApp Atípico Hostel</a>
                </div>
            </div>

            <div class="info-item">
                <div class="icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="info-text">
                <a                                    
                 href="https://goo.gl/maps/sc7PhjgeCVS2"                   target="_blank">
                 O’Higgins 380, Chillán, Ñuble
                </a>
                </div>
            </div>
      <div class="info-item">
                <div class="icon"><i class="fa-regular fa-map"></i></div>
                <div class="info-text">
                    <a href="images/mapa.jpg" target="_blank">Mapa turistico de Chillan</a>
      </div>
            </div>
            <div class="divider"></div>

    
        
        </div>
        <div class="qr-section">
                <div class="qr-code">
                    <img src="images/QR.png" alt="Código QR">
                </div>
            </div>
        <div class="footer">
              <p class="tagline">"Siente la calidez de Chillán. Tu hogar, tu descanso."</p>
        </div>
        <div class="gallery-container">
            <div class="gallery-grid">
                <img src="images/foto 1.png" alt="Hostel Atípico 1" loading="lazy">
                <img src="images/foto 2.png" alt="Hostel Atípico 2" loading="lazy">
                <img src="images/foto 3.png" alt="Hostel Atípico 3" loading="lazy">
                <img src="images/foto 4.png" alt="Hostel Atípico 4" loading="lazy">
                <img src="images/foto 5.png" alt="Hostel Atípico 5" loading="lazy">
            </div>
        </div>
  </div>
   <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./ServiceWorker.js')
                    .then(reg => console.log('Service Worker registrado con éxito'))
                    .catch(err => console.error('Error al registrar Service Worker', err));
            });
        }
    </script>
</body>
</html>
